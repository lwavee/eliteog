version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: eog-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - eog-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: eog-backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/eliteops
      - JWT_SECRET=supersecretjwtkeyforeliteopsglobalenterprise2026
      - JWT_EXPIRE=30d
      - FRONTEND_URL=http://localhost:3000
    depends_on:
      - mongodb
    volumes:
      - ./backend/uploads:/usr/src/app/uploads
    networks:
      - eog-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: eog-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:5000/api
    depends_on:
      - backend
    networks:
      - eog-network

networks:
  eog-network:
    driver: bridge

volumes:
  mongo-data:
    driver: local
